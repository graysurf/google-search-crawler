name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --locked

      - name: Ruff check
        run: uv run --locked ruff check .

      - name: Ruff format (check)
        run: uv run --locked ruff format --check .

      - name: Mypy
        run: uv run --locked mypy

      - name: Pytest smoke (no live)
        run: uv run --locked pytest -m "smoke and not live"
